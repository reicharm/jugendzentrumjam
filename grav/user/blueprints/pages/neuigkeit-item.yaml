title: Neuigkeit
extends@: default

form:
  fields:
    tabs:
      type: tabs
      active: 1
      fields:
        content:
          type: tab
          title: Inhalt
          fields:
            title:
              type: text
              label: Titel
              validate:
                required: true

            content:
              type: markdown-editor
              label: Text

            image:
              type: file
              label: Titelbild
              help: 'Wird groß auf der Startseite, der Übersicht und im Beitrag angezeigt. Querformat empfohlen – ohne Bild bleibt die Fläche leer.'
              destination: '@self'
              accept:
                - image/*

            header.author:
              type: text
              label: Verfasst von
              placeholder: 'z.B. Anna'
